<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>astra os</title>
  <!-- Google Fonts for a futuristic look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap"
    rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/desktop.css">
  <link rel="stylesheet" href="styles/windows.css">
  <link rel="stylesheet" href="styles/apps.css">
</head>

<body>

  <!-- Futuristic Canvas Background -->
  <canvas id="bg-canvas"></canvas>

  <div class="desktop-container">

      <div class="top-bar-left">
        <div class="brand">
          <div class="brand-icon"></div>
          <span>ASTRA OS</span>
        </div>
        <div class="menu-item">System</div>

      </div>

      <div class="top-bar-right">
        <div class="system-clock" id="system-clock">--:--:--</div>
      </div>
    </header>

  </div>

  <!-- Scripts -->
  <script src="js/system.js"></script>
  <script src="js/os.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/explorer.js"></script>
  <script src="js/apps/notepad.js"></script>
  <script src="js/apps/dashboard.js"></script>

</html>
