<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos OS</title>
  <!-- Google Fonts for a futuristic look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/desktop.css">
  <link rel="stylesheet" href="styles/windows.css">
  <link rel="stylesheet" href="styles/apps.css">
</head>
<body>
  <!-- Space Background Effects (Stars, Nebulas) -->
  <div id="space-background">
    <div class="stars"></div>
    <div class="twinkle"></div>
    <div class="nebula"></div>
  </div>

  <!-- Main Desktop Environment -->
  <main id="desktop">
    <!-- Grid of Desktop Icons/Apps -->
    <div id="desktop-grid">
      <!-- Icon templates will go here -->
    </div>

    <!-- Container where dynamic window elements are spawned -->
    <div id="window-container"></div>
  </main>

  <!-- Bottom Taskbar/Dock -->
  <footer id="taskbar">
    <div class="taskbar-left">
      <button id="start-menu-btn" class="glass-btn">🚀 Command</button>
    </div>
    <div class="taskbar-center">
      <div id="dock-apps">
        <!-- Minimized/Running apps indicators will go here -->
      </div>
    </div>
    <div class="taskbar-right">
      <div id="system-clock" class="glass-panel">SD 00000.0</div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/system.js"></script>
  <script src="js/os.js"></script>
  <script src="js/apps/terminal.js"></script>
  <script src="js/apps/explorer.js"></script>
  <script src="js/apps/notepad.js"></script>
  <script src="js/apps/dashboard.js"></script>
</body>
</html>
